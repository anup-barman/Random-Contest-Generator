<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)" />
  <!-- Stylized "S" formed by two syncing arrows -->
  <path d="M62 28 L38 28 Q26 28 26 40 Q26 50 38 50 L62 50 Q74 50 74 62 Q74 72 62 72 L38 72" 
        stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <!-- Top arrow head (pointing right) -->
  <path d="M56 20 L64 28 L56 36" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <!-- Bottom arrow head (pointing left) -->
  <path d="M44 64 L36 72 L44 80" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
